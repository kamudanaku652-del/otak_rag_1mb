name: Build APK Moely - FINAL WORKING
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil kode
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup Project & Fix All
        run: |
          flutter create .
          
          # Update pubspec.yaml dengan versi tflite_flutter yang benar
          cat > pubspec.yaml << 'EOF'
          name: moely_app
          description: Moely AI Chatbot
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            tflite_flutter: ^0.11.0  # ← FIX: versi kompatibel Dart 3.5

          dev_dependencies:
            flutter_test:
              sdk: flutter

          flutter:
            uses-material-design: true
            assets:
              - assets/moely_asli.tflite
              - assets/vocab.json
              - assets/makanan.json
          EOF

          flutter pub get

          # Setup gradle dengan SDK 34 (stabil)
          cat > android/app/build.gradle << 'EOF'
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterRoot = localProperties.getProperty('flutter.sdk')
          if (flutterRoot == null) {
              throw new GradleException("Flutter SDK not found.")
          }

          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

          android {
              namespace "com.example.moely_app"
              compileSdk 34

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }

              defaultConfig {
                  applicationId "com.example.moely_app"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }

          flutter {
              source '../..'
          }
          EOF

          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

          # Setup assets
          mkdir -p assets
          [ -f "moely_asli.tflite" ] && cp moely_asli.tflite assets/ || echo "WARNING: moely_asli.tflite missing"
          [ -f "vocab.json" ] && cp vocab.json assets/ || echo '{"char2idx": {},"idx2char": [],"vocab_size": 1}' > assets/vocab.json
          [ -f "makanan.json" ] && cp makanan.json assets/ || echo '{}' > assets/makanan.json

      - name: Tulis kode main.dart
        run: |
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:tflite_flutter/tflite_flutter.dart';
          import 'dart:convert';
          import 'dart:math';

          void main() => runApp(MoelyApp());

          class MoelyApp extends StatefulWidget {
            @override
            State<MoelyApp> createState() => _MoelyState();
          }

          class _MoelyState extends State<MoelyApp> {
            Interpreter? _interpreter;
            Map<String, dynamic> _vocab = {};
            Map<String, dynamic> _makanan = {};
            String _status = 'Loading...';
            final _controller = TextEditingController();
            List<Map<String, String>> _chat = [];

            @override
            void initState() {
              super.initState();
              _loadOtak();
            }

            Future<void> _loadOtak() async {
              try {
                _interpreter = await Interpreter.fromAsset('assets/moely_asli.tflite');
                _vocab = json.decode(await rootBundle.loadString('assets/vocab.json'));
                _makanan = json.decode(await rootBundle.loadString('assets/makanan.json'));
                setState(() {
                  _status = 'Moely Ready 🔥';
                  _chat.add({'bot': 'Halo kak! Ada yang bisa dibantu?'});
                });
              } catch (e) {
                setState(() => _status = 'Error: $e');
              }
            }

            String _generateText(String prompt) {
              if (_interpreter == null) return 'Model belum siap';
              final char2idx = Map<String, int>.from(_vocab['char2idx'] ?? {});
              final idx2char = List<String>.from(_vocab['idx2char'] ?? []);
              if (char2idx.isEmpty || idx2char.isEmpty) return 'Maaf, model error';

              List<int> inputIds = prompt.split('').map((c) => char2idx[c] ?? 0).toList();
              if (inputIds.isEmpty) inputIds = [0];
              String result = '';

              for (int i = 0; i < 50; i++) {
                var input = [inputIds];
                var output = List.generate(1, (_) => List.generate(inputIds.length, (_) => List.filled(_vocab['vocab_size'] ?? 100, 0.0)));
                _interpreter!.run(input, output);
                var logits = output[0][inputIds.length - 1];
                int nextIdx = 0;
                double maxVal = -1e9;
                for (int j = 0; j < logits.length; j++) {
                  if (logits[j] > maxVal) {
                    maxVal = logits[j];
                    nextIdx = j;
                  }
                }
                if (nextIdx >= idx2char.length) break;
                String nextChar = idx2char[nextIdx];
                if (nextChar == '\n') break;
                result += nextChar;
                inputIds.add(nextIdx);
              }
              return result.isEmpty ? 'Maaf, gak paham 😅' : result;
            }

            void _jawab() {
              final tanya = _controller.text.trim();
              if (tanya.isEmpty || _interpreter == null) return;
              setState(() => _chat.add({'user': tanya}));
              _controller.clear();
              String jawaban = '';

              // Cek makanan.json dulu
              if (_makanan.isNotEmpty) {
                for (var key in _makanan.keys) {
                  if (tanya.toLowerCase().contains(key.toLowerCase())) {
                    jawaban = _makanan[key];
                    break;
                  }
                }
              }

              if (jawaban.isEmpty) {
                jawaban = _generateText('user: $tanya\nbot:');
              }

              setState(() => _chat.add({'bot': jawaban}));
            }

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                home: Scaffold(
                  appBar: AppBar(
                    title: Text(_status),
                    backgroundColor: Colors.black,
                    foregroundColor: Colors.white,
                  ),
                  body: Column(
                    children: [
                      Expanded(
                        child: ListView(
                          padding: EdgeInsets.all(12),
                          children: _chat.map((c) {
                            final isUser = c.containsKey('user');
                            return Align(
                              alignment: isUser ? Alignment.centerRight : Alignment.centerLeft,
                              child: Container(
                                margin: EdgeInsets.symmetric(vertical: 4),
                                padding: EdgeInsets.all(12),
                                decoration: BoxDecoration(
                                  color: isUser ? Colors.black : Colors.grey[300],
                                  borderRadius: BorderRadius.circular(16),
                                ),
                                child: Text(
                                  c.values.first,
                                  style: TextStyle(
                                    color: isUser ? Colors.white : Colors.black,
                                  ),
                                ),
                              ),
                            );
                          }).toList(),
                        ),
                      ),
                      Container(
                        padding: EdgeInsets.all(8),
                        child: Row(
                          children: [
                            Expanded(
                              child: TextField(
                                controller: _controller,
                                onSubmitted: (_) => _jawab(),
                                decoration: InputDecoration(
                                  hintText: 'Ketik pesan...',
                                  border: OutlineInputBorder(
                                    borderRadius: BorderRadius.circular(24),
                                  ),
                                ),
                              ),
                            ),
                            IconButton(
                              icon: Icon(Icons.send),
                              onPressed: _jawab,
                            ),
                          ],
                        ),
                      ),
                    ],
                  ),
                ),
              );
            }
          }
          EOF

      - name: Bersihkan cache dan build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          cd ..
          flutter clean

      - name: Build APK Release
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Moely-APK-Final
          path: build/app/outputs/flutter-apk/*.apk
